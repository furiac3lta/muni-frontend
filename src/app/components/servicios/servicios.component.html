<section class="servicios-section" id="servicios">
  <div class="section-header">
    <span>Servicios municipales</span>
    <h2>Accesos rápidos para vecinos y visitantes</h2>
    <p>Un diseño institucional con tarjetas claras, iconografía moderna y una estructura fácil de navegar.</p>
  </div>

  <div class="servicios-grid">
    <article class="service-card" *ngFor="let item of items">
      <div class="service-icon"><i [class]="item.icon"></i></div>
      <h3>{{ item.title }}</h3>
      <p>{{ item.description }}</p>
    </article>
  </div>
</section>
