<section class="servicios-section" id="servicios">
  <div class="section-header">
    <span>Servicios municipales</span>
    <h2>Accesos directos a las rutas principales</h2>
    <p>Estas tarjetas representan secciones reales del portal y te llevan directo a cada página pública.</p>
  </div>

  <div class="servicios-grid">
    <a class="service-card" *ngFor="let item of items" [routerLink]="item.route">
      <div class="service-icon"><i [class]="item.icon"></i></div>
      <h3>{{ item.title }}</h3>
      <p>{{ item.description }}</p>
    </a>
  </div>
</section>
