server {
    listen 80;
    server_name _;

    location = / {
        return 302 /proyecto/municipio/;
    }

    location = /proyecto/municipio {
        return 301 /proyecto/municipio/;
    }

    location /proyecto/municipio/api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /proyecto/municipio;
    }

    location /proyecto/municipio/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /proyecto/municipio/index.html;
    }
}
